<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Percorrendo Array</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>Percorrendo Array</h1>

    <section class="card">
      <h2>Buscar nome</h2>
      <input id="input-busca" type="text" placeholder="Nome buscado" />
      <button onclick="buscar()">Buscar</button>
      <p id="saida"></p>
    </section>

    <section class="card">
      <h2>Adicionar nome</h2>
      <input id="input-criar" type="text" placeholder="Novo nome" />
      <button onclick="criar()">Adicionar</button>
      <p id="saida-criar"></p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
